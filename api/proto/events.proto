syntax = "proto3";

package ads.v1;

option go_package = "github.com/mykhailov-ua/ad-event-processor/internal/ads/pb";

message AdEvent {
  string campaign_id = 1;
  string event_type = 2;
  EventMetadata metadata = 3;
}

message EventMetadata {
  string click_id = 1;
  string user_id = 2;
  string device_type = 3;
  string os = 4;
  map<string, string> extra = 5;
}

message TrackResponse {
  string request_id = 1;
  string status = 2;
}
